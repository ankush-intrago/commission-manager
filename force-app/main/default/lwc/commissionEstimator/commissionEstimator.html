<template>
    <lightning-card title="Commission Estimator" icon-name="standard:currency">
        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>

            <template if:false={isLoading}>
                <template if:true={hasError}>
                    <div class="slds-text-color_error slds-p-around_small">
                        <lightning-icon icon-name="utility:error" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        {errorMessage}
                    </div>
                </template>

                <template if:false={hasError}>
                    <div class="slds-grid slds-gutters">
                        <div class="slds-col slds-size_1-of-2">
                            <div class="slds-text-title_caps slds-m-bottom_xx-small">Deal Amount</div>
                            <div class="slds-text-heading_medium">
                                <lightning-formatted-number
                                    value={dealAmount}
                                    format-style="currency"
                                    currency-code="USD">
                                </lightning-formatted-number>
                            </div>
                        </div>
                        <div class="slds-col slds-size_1-of-2">
                            <div class="slds-text-title_caps slds-m-bottom_xx-small">Estimated Commission</div>
                            <div class="slds-text-heading_medium slds-text-color_success">
                                <lightning-formatted-number
                                    value={estimatedCommission}
                                    format-style="currency"
                                    currency-code="USD">
                                </lightning-formatted-number>
                            </div>
                        </div>
                    </div>

                    <template if:true={hasCommission}>
                        <div class="slds-m-top_medium">
                            <div class="slds-progress-bar slds-progress-bar_circular" aria-valuemin="0" aria-valuemax="100" aria-valuenow={commissionPercentage}>
                                <span class="slds-progress-bar__value slds-progress-bar__value_success" style={progressBarStyle}></span>
                            </div>
                            <div class="slds-text-align_center slds-m-top_x-small slds-text-body_small">
                                Effective Rate: {effectiveRateDisplay}%
                            </div>
                        </div>
                    </template>

                    <template if:false={hasCommission}>
                        <div class="slds-text-color_weak slds-m-top_medium slds-text-align_center">
                            No active commission plan found for this opportunity.
                        </div>
                    </template>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
